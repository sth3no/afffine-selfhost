name: affine-stack

# AFFiNE self-host + MCP automation agent
# Deploy via Portainer → Stacks → Add stack (Git repository or Web editor)

services:
  affine:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_server
    ports:
      - '${PORT:-3010}:3010'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    volumes:
      - affine_storage:/root/.affine/storage
      - affine_config:/root/.affine/config
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
      # Public URL config — pick ONE of these approaches:
      #   (a) AFFINE_SERVER_EXTERNAL_URL=https://affine.example.com  (single URL)
      #   (b) AFFINE_SERVER_HOST=affine.example.com + AFFINE_SERVER_HTTPS=true
      - AFFINE_SERVER_EXTERNAL_URL=${AFFINE_SERVER_EXTERNAL_URL:-http://localhost:3010}
      - AFFINE_SERVER_HOST=${AFFINE_SERVER_HOST:-}
      - AFFINE_SERVER_HTTPS=${AFFINE_SERVER_HTTPS:-}
      - MAILER_HOST=${MAILER_HOST:-}
      - MAILER_PORT=${MAILER_PORT:-}
      - MAILER_USER=${MAILER_USER:-}
      - MAILER_PASSWORD=${MAILER_PASSWORD:-}
      - MAILER_SENDER=${MAILER_SENDER:-}
    restart: unless-stopped
    networks:
      - affine_net
      - shared_net

  affine_migration:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_migration_job
    volumes:
      - affine_storage:/root/.affine/storage
      - affine_config:/root/.affine/config
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - affine_net

  redis:
    image: redis:7-alpine
    container_name: affine_redis
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - affine_net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: affine_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-affine}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${DB_USERNAME}', '-d', '${DB_DATABASE:-affine}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - affine_net

  mcp_agent:
    build:
      context: ./mcp-agent
      dockerfile: Dockerfile
    image: affine-mcp-agent:local
    # Never try to pull this image from a registry — it's built locally.
    # Without this, Portainer's "Pull and redeploy" fails because
    # affine-mcp-agent:local doesn't exist in any registry.
    pull_policy: build
    container_name: affine_mcp_agent
    depends_on:
      affine:
        condition: service_started
    environment:
      - AFFINE_BASE_URL=http://affine:3010
      - AFFINE_WORKSPACE_ID=${AFFINE_WORKSPACE_ID:-}
      - AFFINE_ACCESS_TOKEN=${AFFINE_ACCESS_TOKEN:-}
      - TZ=${TZ:-UTC}
    restart: unless-stopped
    networks:
      - affine_net

networks:
  affine_net:
    driver: bridge
  # External network shared with other stacks (e.g. n8n). Must be created
  # once on the host BEFORE deploying this stack:
  #   docker network create shared_net
  # Any other stack that also joins `shared_net` (as external) can reach
  # this AFFiNE instance at http://affine:3010
  shared_net:
    external: true
    name: ${SHARED_NETWORK:-shared_net}

volumes:
  postgres_data:
  redis_data:
  affine_storage:
  affine_config:
